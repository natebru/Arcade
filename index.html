<!doctype html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }

  @keyframes nateChase {
    0%, 49% { background: #fff; box-shadow: 0 0 6px #fff; }
    50%, 100% { background: rgba(255,255,255,.2); box-shadow: none; }
  }
  @keyframes nateTwinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
  @keyframes nateTicker {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #333; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script>
// ── Apps data ──────────────────────────────────────────────────────────
window.NATE_APPS = [
  { slug: 'vibedex',  name: "VIBEDEX",         genre: 'TOOLS',  blurb: "Rate any URL's vibe quotient.",             plays: 14203, score: '9001',  year: '2025', accent: 'magenta', preview: 'bars'    },
  { slug: 'pizza',    name: "PIXEL PIZZA",      genre: 'ARCADE', blurb: "Drag toppings. Judge taste. Get roasted.",  plays: 8821,  score: '742k',  year: '2024', accent: 'red',     preview: 'pizza'   },
  { slug: 'duck',     name: "DUCK DEBUG",       genre: 'TOOLS',  blurb: "Confess your bug. The duck quacks back.",   plays: 5519,  score: '∞',     year: '2025', accent: 'yellow',  preview: 'duck'    },
  { slug: 'oracle',   name: "EMOJI ORACLE",     genre: 'VIBES',  blurb: "Three glyphs. Your future. No appeals.",   plays: 21044, score: '1.2M',  year: '2024', accent: 'cyan',    preview: 'oracle'  },
  { slug: 'kombat',   name: "KEYBOARD KOMBAT",  genre: 'ARCADE', blurb: "Type-fighter battle royale. WPM = damage.", plays: 33012, score: '11380', year: '2025', accent: 'red',     preview: 'kombat'  },
  { slug: 'lofi',     name: "LOFI FORGE",       genre: 'VIBES',  blurb: "Generative beats. Forge. Loop. Vibe.",      plays: 9201,  score: '88bpm', year: '2023', accent: 'purple',  preview: 'lofi'    },
  { slug: 'escape',   name: "404 ESCAPE",       genre: 'PUZZLE', blurb: "You are a lost packet. Find the route.",    plays: 6722,  score: '404',   year: '2024', accent: 'green',   preview: 'maze'    },
  { slug: 'goblin',   name: "GRADIENT GOBLIN",  genre: 'IDLE',   blurb: "Feed it hex codes. Watch it evolve.",       plays: 3344,  score: '#FF5',  year: '2025', accent: 'lime',    preview: 'goblin'  },
  { slug: 'snack',    name: "SNACK STACK",      genre: 'ARCADE', blurb: "Tower defense, but the towers are snacks.", plays: 17880, score: '52k',   year: '2024', accent: 'orange',  preview: 'snack'   },
  { slug: 'tarot',    name: "TERMINAL TAROT",   genre: 'VIBES',  blurb: "ASCII cards reveal your stack trace.",      plays: 4710,  score: '78',    year: '2025', accent: 'purple',  preview: 'tarot'   },
  { slug: 'ship',     name: "SHIP IT",          genre: 'IDLE',   blurb: "Idle clicker. Ship features. Resist scope.",plays: 12305, score: 'v9.9',  year: '2024', accent: 'cyan',    preview: 'ship'    },
  { slug: 'karaoke',  name: "CRT KARAOKE",      genre: 'VIBES',  blurb: "Sing to lyrics that scroll like Star Wars.",plays: 7765,  score: '★★★★', year: '2025', accent: 'pink',    preview: 'karaoke' },
];

// ── Web Audio sound system ─────────────────────────────────────────────
(function () {
  let ctx = null, muted = false;
  const ensure = () => {
    if (!ctx) try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  };
  window.addEventListener('pointerdown', () => ensure(), { once: true });
  window.addEventListener('keydown',     () => ensure(), { once: true });

  function blip({ freq = 440, dur = 0.08, type = 'square', vol = 0.12, slide = 0 } = {}) {
    const c = ensure(); if (!c || muted) return;
    const t = c.currentTime;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain).connect(c.destination);
    osc.start(t); osc.stop(t + dur);
  }
  function sequence(notes) {
    const c = ensure(); if (!c) return;
    let delay = 0;
    notes.forEach(n => { setTimeout(() => blip(n), delay * 1000); delay += n.gap ?? n.dur ?? 0.08; });
  }
  window.arcadeSound = {
    hover:   () => blip({ freq: 880, dur: 0.04, vol: 0.05 }),
    click:   () => blip({ freq: 660, dur: 0.06, vol: 0.10, slide: 220 }),
    coin:    () => sequence([{ freq: 988, dur: 0.06, vol: 0.10 }, { freq: 1319, dur: 0.10, vol: 0.10 }]),
    powerup: () => sequence([{ freq: 523, dur: 0.06, vol: 0.10 }, { freq: 659, dur: 0.06, vol: 0.10 }, { freq: 784, dur: 0.06, vol: 0.10 }, { freq: 1047, dur: 0.10, vol: 0.10 }]),
    select:  () => blip({ freq: 1200, dur: 0.04, vol: 0.07 }),
    mute:    (v) => { muted = !!v; },
  };
})();

// ── Accent colours ─────────────────────────────────────────────────────
window.PIXEL_COLORS = {
  red: '#ff2d2d', yellow: '#ffd400', blue: '#1f6fff', cyan: '#00e5ff',
  green: '#00d651', lime: '#b6ff2f', orange: '#ff8a00',
  pink: '#ff4fa1', magenta: '#ff2dc3', purple: '#a347ff',
};
window.getAccent = name => window.PIXEL_COLORS[name] || window.PIXEL_COLORS.red;

// ── Palettes ───────────────────────────────────────────────────────────
window.PALETTES = [
  { label: 'Classic',     colors: ['#ff2d2d', '#ffd400', '#1f6fff'] },
  { label: 'Neon Galaga', colors: ['#ff2dc3', '#00e5ff', '#b6ff2f'] },
  { label: 'Atari',       colors: ['#ff8a00', '#1e8a8a', '#f5deb3'] },
  { label: 'Vapor',       colors: ['#ff4fa1', '#a347ff', '#00e5ff'] },
];
window.FONTS = {
  pixel: '"Press Start 2P", monospace',
  mono:  '"JetBrains Mono", ui-monospace, monospace',
};
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ── useTicker ──────────────────────────────────────────────────────────
function useTicker(active) {
  const [t, setT] = React.useState(0);
  React.useEffect(() => {
    if (!active) { setT(0); return; }
    let raf, start = performance.now();
    const loop = now => { setT((now - start) / 1000); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [active]);
  return t;
}

// ── PixelArt ───────────────────────────────────────────────────────────
function PixelArt({ grid, px = 4, palette }) {
  return (
    <div style={{ display: 'inline-block', lineHeight: 0 }}>
      {grid.map((row, ri) => (
        <div key={ri} style={{ display: 'flex' }}>
          {row.split('').map((c, ci) => (
            <div key={ci} style={{ width: px, height: px, background: c === '.' ? 'transparent' : (palette[c] || '#fff') }} />
          ))}
        </div>
      ))}
    </div>
  );
}

// ── Scanline overlay ───────────────────────────────────────────────────
function ScanlineOverlay() {
  return (
    <div style={{
      position: 'absolute', inset: 0, pointerEvents: 'none',
      backgroundImage: 'repeating-linear-gradient(0deg, rgba(0,0,0,.25) 0px, rgba(0,0,0,.25) 1px, transparent 1px, transparent 3px)',
      mixBlendMode: 'multiply',
    }} />
  );
}

// ── Idle screen ────────────────────────────────────────────────────────
function IdleScreen({ app, kind }) {
  const accent = window.getAccent(app.accent);
  if (kind === 'title') {
    return (
      <div style={{
        position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', gap: 6,
        fontFamily: '"Press Start 2P", monospace',
        color: accent, textAlign: 'center', padding: 8,
      }}>
        <div style={{ fontSize: 9, letterSpacing: 1, lineHeight: 1.5, textShadow: '2px 2px 0 #000' }}>{app.name}</div>
        <div style={{ fontSize: 6, color: '#fff', opacity: 0.7, marginTop: 4 }}>INSERT COIN</div>
      </div>
    );
  }
  const stars = React.useMemo(() =>
    Array.from({ length: 18 }, (_, i) => ({
      x: (i * 37 + app.slug.charCodeAt(0) * 7) % 100,
      y: (i * 53 + app.slug.charCodeAt(1) * 11) % 100,
      s: (i % 3) + 1,
      d: (i % 5) * 0.6,
    })), [app.slug]);
  return (
    <div style={{ position: 'absolute', inset: 0, background: '#070712' }}>
      {stars.map((s, i) => (
        <div key={i} style={{
          position: 'absolute', left: `${s.x}%`, top: `${s.y}%`,
          width: s.s, height: s.s, background: '#fff', opacity: 0.85,
          animation: `nateTwinkle 1.6s ${s.d}s infinite`,
        }} />
      ))}
      <div style={{
        position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: '"Press Start 2P", monospace', color: accent, fontSize: 9,
        letterSpacing: 1, textShadow: '2px 2px 0 #000',
      }}>
        {app.name.length > 14 ? app.name.split(' ')[0] : app.name}
      </div>
    </div>
  );
}

// ── Preview animations ─────────────────────────────────────────────────
const PREVIEWS = {
  bars: ({ app }) => {
    const t = useTicker(true);
    const accent = window.getAccent(app.accent);
    return (
      <div style={{ position:'absolute', inset:0, background:'#0b0b1a', display:'flex', alignItems:'flex-end', justifyContent:'center', gap:3, padding:12 }}>
        {Array.from({ length: 9 }).map((_, i) => {
          const h = 20 + Math.abs(Math.sin(t * 4 + i * 0.7)) * 70;
          return <div key={i} style={{ width:8, height:`${h}%`, background:accent, boxShadow:`0 0 8px ${accent}` }} />;
        })}
      </div>
    );
  },
  pizza: ({ app }) => {
    const t = useTicker(true);
    const toppings = ['◆','●','■','▲','★'];
    return (
      <div style={{ position:'absolute', inset:0, background:'#1a0808', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ width:70, height:70, borderRadius:'50%', background:'radial-gradient(circle at 50% 50%, #ffb84d 0 35%, #d23a13 35% 100%)', border:'3px solid #2a1100', position:'relative', transform:`rotate(${t*30}deg)` }}>
          {toppings.map((c, i) => {
            const ang = (i / toppings.length) * Math.PI * 2;
            return <div key={i} style={{ position:'absolute', left:`${50+Math.cos(ang)*18}%`, top:`${50+Math.sin(ang)*18}%`, transform:'translate(-50%,-50%)', color:'#c0241b', fontSize:14, fontWeight:700 }}>{c}</div>;
          })}
        </div>
      </div>
    );
  },
  duck: ({ app }) => {
    const t = useTicker(true);
    const y = Math.abs(Math.sin(t * 3)) * 16;
    return (
      <div style={{ position:'absolute', inset:0, background:'#1d1500', display:'flex', alignItems:'flex-end', justifyContent:'center', paddingBottom:16 }}>
        <div style={{ transform:`translateY(-${y}px)` }}>
          <PixelArt grid={["..yyyy..","yyyyyy.","yykyykyy","yyyyyyyy",".yyyyyy.","..oo.oo."]} px={6} palette={{ y:'#ffd400', k:'#000', o:'#ff8a00' }} />
        </div>
      </div>
    );
  },
  oracle: ({ app }) => {
    const t = useTicker(true);
    const glyphs = ['◯','◇','✦','♣','♠','♥','♦','☾','☀','✺','▲','■'];
    return (
      <div style={{ position:'absolute', inset:0, background:'#001a1c', display:'flex', alignItems:'center', justifyContent:'center', gap:10, color:'#00e5ff', fontSize:32, textShadow:'0 0 8px #00e5ff' }}>
        <span>{glyphs[Math.floor(t*4)%glyphs.length]}</span>
        <span>{glyphs[Math.floor(t*3)%glyphs.length]}</span>
        <span>{glyphs[Math.floor(t*5)%glyphs.length]}</span>
      </div>
    );
  },
  kombat: ({ app }) => {
    const t = useTicker(true);
    const punch = Math.floor(t * 6) % 2 === 0;
    return (
      <div style={{ position:'absolute', inset:0, background:'#1a0000', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 12px' }}>
        <div style={{ fontFamily:'"Press Start 2P",monospace', color:'#ff2d2d', fontSize:10 }}>P1</div>
        <div style={{ fontFamily:'"Press Start 2P",monospace', color:'#ffd400', fontSize:14, transform:punch?'scale(1.3)':'scale(1)', transition:'transform .05s' }}>{punch?'POW!':'WHAM!'}</div>
        <div style={{ fontFamily:'"Press Start 2P",monospace', color:'#1f6fff', fontSize:10 }}>P2</div>
      </div>
    );
  },
  lofi: ({ app }) => {
    const t = useTicker(true);
    const pts = Array.from({ length: 40 }, (_, i) => {
      const x = i / 39;
      const y = 0.5 + Math.sin(x * 12 + t * 4) * 0.25 * Math.sin(t * 0.7 + x * 3);
      return `${x*100},${y*100}`;
    }).join(' ');
    return (
      <div style={{ position:'absolute', inset:0, background:'#13001f' }}>
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position:'absolute', inset:0, width:'100%', height:'100%' }}>
          <polyline points={pts} fill="none" stroke="#a347ff" strokeWidth="2" />
        </svg>
      </div>
    );
  },
  maze: ({ app }) => {
    const t = useTicker(true);
    const blink = Math.floor(t * 3) % 2 === 0;
    return (
      <div style={{ position:'absolute', inset:0, background:'#001500', fontFamily:'monospace', color:'#00d651', fontSize:8, padding:6, lineHeight:1, whiteSpace:'pre' }}>
{`#####################
#.....#.......#.....#
#.###.#.#####.#.###.#
#.#...#.#...#.#.#...#
#.#.###.#.#.#.#.#.###
#.#.....#.#...#.....#
#.#######.#####.###.#
#.........#.....#...#
#####################`}
        <div style={{ position:'absolute', bottom:8, right:12, color:'#00d651', fontSize:11, fontFamily:'"Press Start 2P",monospace', opacity:blink?1:0.3 }}>404</div>
      </div>
    );
  },
  goblin: ({ app }) => {
    const t = useTicker(true);
    const hue = (t * 60) % 360;
    return (
      <div style={{ position:'absolute', inset:0, background:`hsl(${hue},70%,25%)`, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <PixelArt grid={["..ggggg..","ggggggggg","gwgkgwggg","ggggggggg","gg.k.gg..","g.k.g...."]} px={6}
          palette={{ g:`hsl(${(hue+120)%360},80%,50%)`, w:'#fff', k:'#000' }} />
      </div>
    );
  },
  snack: ({ app }) => {
    const t = useTicker(true);
    const stack = Math.floor(t * 2) % 5;
    return (
      <div style={{ position:'absolute', inset:0, background:'#1a0d00', display:'flex', alignItems:'flex-end', justifyContent:'center', paddingBottom:14, gap:0, flexDirection:'column-reverse' }}>
        {Array.from({ length: stack+1 }).map((_, i) => (
          <div key={i} style={{ width:50-i*4, height:10, background:['#ff8a00','#ffd400','#ff2d2d','#a347ff','#00d651'][i%5], border:'2px solid #000', marginTop:-2 }} />
        ))}
      </div>
    );
  },
  tarot: ({ app }) => {
    const t = useTicker(true);
    const flip = Math.floor(t * 1.5) % 4;
    const cards = ['☉','☽','☿','♀','♂','♃','♄'];
    return (
      <div style={{ position:'absolute', inset:0, background:'#0f0020', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{ width:26, height:40, background:i===flip%3?'#a347ff':'#1a0033', border:'2px solid #a347ff', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:14, fontFamily:'monospace' }}>
            {i===flip%3 ? cards[(flip+i)%cards.length] : '?'}
          </div>
        ))}
      </div>
    );
  },
  ship: ({ app }) => {
    const t = useTicker(true);
    const pct = (Math.sin(t * 0.8) * 0.5 + 0.5) * 100;
    return (
      <div style={{ position:'absolute', inset:0, background:'#001a1a', display:'flex', flexDirection:'column', justifyContent:'center', padding:16, gap:8 }}>
        <div style={{ fontFamily:'"Press Start 2P",monospace', color:'#00e5ff', fontSize:8 }}>SHIPPING...</div>
        <div style={{ width:'100%', height:12, background:'#003333', border:'2px solid #00e5ff' }}>
          <div style={{ width:`${pct}%`, height:'100%', background:'#00e5ff' }} />
        </div>
        <div style={{ fontFamily:'"Press Start 2P",monospace', color:'#fff', fontSize:7, opacity:0.7 }}>{Math.floor(pct)}%</div>
      </div>
    );
  },
  karaoke: ({ app }) => {
    const t = useTicker(true);
    const y = -(t * 25) % 120;
    const lines = ['LA LA LA','OOH BABY','SING IT','♫ ♪ ♫','ENCORE'];
    return (
      <div style={{ position:'absolute', inset:0, background:'#1a001a', overflow:'hidden' }}>
        {lines.map((ln, i) => (
          <div key={i} style={{ position:'absolute', left:0, right:0, textAlign:'center', top:`${100+y+i*24}%`, fontFamily:'"Press Start 2P",monospace', color:'#ff4fa1', fontSize:10, textShadow:'2px 2px 0 #000' }}>{ln}</div>
        ))}
      </div>
    );
  },
};

// ── CabinetScreen ──────────────────────────────────────────────────────
function CabinetScreen({ app, active, idleStyle = 'starfield' }) {
  const P = PREVIEWS[app.preview] || PREVIEWS.bars;
  return (
    <div style={{ position:'relative', width:'100%', height:'100%', background:'#000', overflow:'hidden', imageRendering:'pixelated' }}>
      {active ? <P app={app} /> : <IdleScreen app={app} kind={idleStyle} />}
      <ScanlineOverlay />
    </div>
  );
}

// ── PixelLogo ──────────────────────────────────────────────────────────
function PixelLogo({ palette }) {
  const grid = ["kkkkkkkk","krk....k","krrk...k","krrrk..k","krrrrkkk","kkkkkkkk"];
  return (
    <div style={{ display:'inline-block', lineHeight:0, border:`3px solid ${palette[0]}`, padding:4, background:palette[1], flexShrink:0 }}>
      {grid.map((row, ri) => (
        <div key={ri} style={{ display:'flex' }}>
          {row.split('').map((c, ci) => (
            <div key={ci} style={{ width:5, height:5, background:c==='k'?'#000':c==='r'?palette[0]:'transparent' }} />
          ))}
        </div>
      ))}
    </div>
  );
}

// ── ChaseLights ────────────────────────────────────────────────────────
function ChaseLights({ count = 30, color }) {
  return (
    <div style={{ display:'flex', gap:4, padding:'4px 8px', overflow:'hidden' }}>
      {Array.from({ length: count }).map((_, i) => (
        <div key={i} style={{
          width:8, height:8, borderRadius:'50%', background:color,
          border:'1px solid #000', flexShrink:0,
          animation:`nateChase 1s ${(i*0.05)%1}s infinite`,
        }} />
      ))}
    </div>
  );
}

// ── MarqueeCabinet (compact grid card) ─────────────────────────────────
function MarqueeCabinet({ app, palette, fontFamily, onSelect }) {
  const [hover, setHover] = React.useState(false);
  const accent = window.getAccent(app.accent);
  return (
    <div
      onMouseEnter={() => { setHover(true); window.arcadeSound.hover(); }}
      onMouseLeave={() => setHover(false)}
      onClick={() => { window.arcadeSound.select(); onSelect(app); }}
      style={{
        position:'relative', cursor:'pointer',
        background:'#0a0a0e',
        border:'3px solid #000',
        boxShadow: hover ? `0 0 0 3px ${accent}, 5px 5px 0 #000` : '5px 5px 0 #000',
        transition:'box-shadow .12s, transform .12s',
        transform: hover ? 'translateY(-3px)' : 'none',
      }}
    >
      {/* marquee strip */}
      <div style={{ background:palette[app.slug.charCodeAt(1) % palette.length], borderBottom:'3px solid #000', padding:'4px 8px 6px', position:'relative' }}>
        <div style={{ position:'absolute', top:1, left:0, right:0, display:'flex', justifyContent:'space-between', padding:'0 4px' }}>
          {Array.from({ length: 8 }).map((_, i) => (
            <div key={i} style={{ width:3, height:3, background:'#fff', animation:hover?`nateChase 0.5s ${(i*0.06)%0.5}s infinite`:'none', opacity:hover?1:0.5 }} />
          ))}
        </div>
        <div style={{ fontFamily, fontSize:9, fontWeight:700, color:'#000', textAlign:'center', letterSpacing:1, padding:'4px 0 0', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{app.name}</div>
      </div>
      {/* screen */}
      <div style={{ padding:6, background:'#1a1a1f' }}>
        <div style={{ position:'relative', height:72, border:'2px solid #000', overflow:'hidden', boxShadow:'inset 0 0 10px rgba(0,0,0,.9)' }}>
          <CabinetScreen app={app} active={hover} idleStyle="starfield" />
        </div>
      </div>
      {/* footer */}
      <div style={{ background:'#000', padding:'5px 8px', display:'flex', justifyContent:'space-between', alignItems:'center', fontFamily, fontSize:6, color:accent, letterSpacing:1 }}>
        <span>▸{app.genre}</span>
        <span style={{ color:'#fff', opacity:0.6 }}>{app.plays.toLocaleString()}</span>
      </div>
    </div>
  );
}

// ── FeaturedHero ───────────────────────────────────────────────────────
function FeaturedHero({ app, palette, fontFamily }) {
  return (
    <div style={{
      position:'relative', background:'#000',
      border:'4px solid #000',
      boxShadow:`0 0 0 3px ${palette[0]}, 8px 8px 0 ${palette[2]}`,
      display:'grid', gridTemplateColumns:'1.4fr 1fr',
      flexShrink:0,
    }}>
      {/* big CRT screen */}
      <div style={{ position:'relative', minHeight:220, borderRight:'3px solid #000' }}>
        <div style={{ position:'absolute', inset:0 }}>
          <CabinetScreen app={app} active={true} idleStyle="title" />
        </div>
        <div style={{ position:'absolute', top:8, left:8, background:'#000', color:palette[0], padding:'4px 8px', fontFamily, fontSize:8, letterSpacing:1, border:`2px solid ${palette[0]}` }}>▸ NOW PLAYING</div>
      </div>
      {/* meta panel */}
      <div style={{ padding:16, background:palette[0], display:'flex', flexDirection:'column', justifyContent:'space-between', gap:10 }}>
        <div>
          <div style={{ fontFamily, fontSize:8, color:'#000', letterSpacing:2, opacity:0.7 }}>▸ {app.genre} · {app.year}</div>
          <div style={{ fontFamily, fontSize:20, fontWeight:800, color:'#000', letterSpacing:1, marginTop:6, lineHeight:1.1, textShadow:`3px 3px 0 ${palette[2]}` }}>{app.name}</div>
          <div style={{ fontFamily, fontSize:10, color:'#000', marginTop:10, lineHeight:1.5, fontWeight:600 }}>{app.blurb}</div>
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <div style={{ flex:1, background:'#000', color:palette[0], padding:'6px 8px', fontFamily, fontSize:8, letterSpacing:1, border:'2px solid #000' }}>
            <div style={{ opacity:0.6 }}>HI-SCORE</div>
            <div style={{ fontSize:16, fontWeight:800, marginTop:2 }}>{app.score}</div>
          </div>
          <div style={{ flex:1, background:'#000', color:palette[0], padding:'6px 8px', fontFamily, fontSize:8, letterSpacing:1, border:'2px solid #000' }}>
            <div style={{ opacity:0.6 }}>PLAYS</div>
            <div style={{ fontSize:16, fontWeight:800, marginTop:2 }}>{app.plays.toLocaleString()}</div>
          </div>
        </div>
        <button
          onClick={() => window.arcadeSound.coin()}
          style={{ padding:'10px 14px', background:'#000', color:palette[0], border:'3px solid #000', fontFamily, fontSize:11, fontWeight:700, letterSpacing:2, cursor:'pointer' }}
        >★ INSERT COIN ★</button>
      </div>
    </div>
  );
}

// ── Leaderboard ────────────────────────────────────────────────────────
function Leaderboard({ apps, palette, fontFamily }) {
  const top = [...apps].sort((a, b) => b.plays - a.plays).slice(0, 10);
  return (
    <div style={{ background:'#000', border:`3px solid ${palette[0]}`, padding:12, display:'flex', flexDirection:'column', gap:8, boxShadow:`5px 5px 0 ${palette[2]}`, overflowY:'auto' }}>
      <div style={{ fontFamily, fontSize:11, fontWeight:700, color:palette[0], letterSpacing:2, paddingBottom:6, borderBottom:`2px dashed ${palette[0]}55`, flexShrink:0 }}>★ HIGH SCORES</div>
      {top.map((app, i) => {
        const accent = window.getAccent(app.accent);
        return (
          <div key={app.slug} style={{ display:'flex', alignItems:'center', gap:8, fontFamily, fontSize:9, color:'#fff', letterSpacing:1 }}>
            <span style={{ color:i===0?palette[1]:palette[0], width:18, fontWeight:700 }}>{String(i+1).padStart(2,'0')}</span>
            <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{app.name}</span>
            <span style={{ color:accent, fontVariantNumeric:'tabular-nums' }}>{app.plays.toLocaleString()}</span>
          </div>
        );
      })}
      <div style={{ flex:1 }} />
      <div style={{ padding:8, border:`2px dashed ${palette[0]}55`, fontFamily, fontSize:8, color:'#fff', opacity:0.7, letterSpacing:1, textAlign:'center', lineHeight:1.5, flexShrink:0 }}>
        TYPE YOUR INITIALS<br />TO ENTER THE BOARD
      </div>
    </div>
  );
}

// ── Settings panel ─────────────────────────────────────────────────────
function SettingsPanel({ paletteIdx, setPaletteIdx, font, setFont }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ position:'fixed', bottom:16, right:16, zIndex:100 }}>
      {open && (
        <div style={{ background:'#111', border:'3px solid #fff', padding:14, marginBottom:8, minWidth:220, boxShadow:'6px 6px 0 #000' }}>
          <div style={{ fontFamily:'"Press Start 2P",monospace', fontSize:9, color:'#fff', marginBottom:10, letterSpacing:1 }}>⚙ TWEAKS</div>
          <div style={{ fontFamily:'"Press Start 2P",monospace', fontSize:7, color:'#aaa', letterSpacing:1, marginBottom:6 }}>PALETTE</div>
          <div style={{ display:'flex', flexDirection:'column', gap:4, marginBottom:12 }}>
            {window.PALETTES.map((p, i) => (
              <button key={i} onClick={() => setPaletteIdx(i)} style={{
                display:'flex', alignItems:'center', gap:8, padding:'6px 8px',
                background:paletteIdx===i?'#fff':'transparent', color:paletteIdx===i?'#000':'#fff',
                border:'2px solid #fff', cursor:'pointer',
                fontFamily:'"Press Start 2P",monospace', fontSize:8,
              }}>
                <div style={{ display:'flex', gap:3 }}>
                  {p.colors.map((c, j) => <div key={j} style={{ width:10, height:10, background:c, border:'1px solid #000' }} />)}
                </div>
                {p.label}
              </button>
            ))}
          </div>
          <div style={{ fontFamily:'"Press Start 2P",monospace', fontSize:7, color:'#aaa', letterSpacing:1, marginBottom:6 }}>FONT</div>
          <div style={{ display:'flex', gap:6 }}>
            {['pixel','mono'].map(f => (
              <button key={f} onClick={() => setFont(f)} style={{
                flex:1, padding:'6px 8px',
                background:font===f?'#fff':'transparent', color:font===f?'#000':'#fff',
                border:'2px solid #fff', cursor:'pointer',
                fontFamily:'"Press Start 2P",monospace', fontSize:8, letterSpacing:1,
              }}>{f.toUpperCase()}</button>
            ))}
          </div>
        </div>
      )}
      <button
        onClick={() => setOpen(o => !o)}
        style={{ display:'block', marginLeft:'auto', padding:'10px 14px', background:open?'#fff':'#000', color:open?'#000':'#fff', border:'3px solid #fff', fontFamily:'"Press Start 2P",monospace', fontSize:11, cursor:'pointer', boxShadow:'4px 4px 0 #555' }}
      >{open ? '✕' : '⚙'}</button>
    </div>
  );
}

// ── Root App ───────────────────────────────────────────────────────────
function App() {
  const apps = window.NATE_APPS;
  const [featured, setFeatured] = React.useState(apps[4]); // KEYBOARD KOMBAT
  const [genre, setGenre] = React.useState('ALL');
  const [paletteIdx, setPaletteIdx] = React.useState(2); // Atari
  const [font, setFont] = React.useState('pixel');

  const palette = window.PALETTES[paletteIdx].colors;
  const fontFamily = window.FONTS[font];

  const genres = ['ALL','ARCADE','PUZZLE','IDLE','VIBES','TOOLS'];
  const filtered = genre === 'ALL' ? apps : apps.filter(a => a.genre === genre);

  return (
    <div style={{ width:'100vw', height:'100vh', display:'flex', flexDirection:'column', background:'#0a0a12', fontFamily, overflow:'hidden', position:'relative' }}>
      {/* Stage-light wash */}
      <div style={{ position:'absolute', inset:0, background:`radial-gradient(ellipse at 50% -10%, ${palette[0]}22, transparent 60%), radial-gradient(ellipse at 0% 100%, ${palette[2]}22, transparent 50%)`, pointerEvents:'none', zIndex:0 }} />

      {/* ── TOP MARQUEE ── */}
      <div style={{ position:'relative', background:'#000', borderBottom:`4px solid ${palette[0]}`, zIndex:10, flexShrink:0 }}>
        <ChaseLights count={60} color={palette[1]} />
        <div style={{ padding:'14px 32px', background:`linear-gradient(180deg, ${palette[0]} 0%, ${palette[0]} 60%, ${palette[2]} 60%, ${palette[2]} 100%)`, borderTop:'4px solid #000', borderBottom:'4px solid #000', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12 }}>
          <div style={{ display:'flex', alignItems:'center', gap:14, minWidth:0 }}>
            <PixelLogo palette={palette} />
            <div>
              <div style={{ fontFamily, fontSize:'clamp(16px, 2.5vw, 30px)', fontWeight:800, color:'#000', letterSpacing:3, textShadow:'4px 4px 0 #fff', lineHeight:1, whiteSpace:'nowrap' }}>NATE'S ARCADE</div>
              <div style={{ fontFamily, fontSize:'clamp(6px, 0.7vw, 9px)', color:'#000', letterSpacing:2, marginTop:4, whiteSpace:'nowrap' }}>▸ NOW SHOWING ▸ 12 ATTRACTIONS ▸ ADMISSION FREE ▸</div>
            </div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:14, flexShrink:0 }}>
            <div style={{ fontFamily, fontSize:9, color:'#000', letterSpacing:1, textAlign:'right', lineHeight:1.4 }}>
              <div style={{ opacity:0.7 }}>LIVE PLAYERS</div>
              <div style={{ fontSize:18, fontWeight:800 }}>1,247</div>
            </div>
            <button
              onClick={() => window.arcadeSound.powerup()}
              style={{ padding:'12px 18px', background:'#000', color:palette[0], border:`3px solid ${palette[0]}`, fontFamily, fontSize:11, fontWeight:700, letterSpacing:2, cursor:'pointer', boxShadow:`4px 4px 0 ${palette[2]}`, whiteSpace:'nowrap' }}
            >▶ PRESS START</button>
          </div>
        </div>
        <ChaseLights count={60} color={palette[1]} />
      </div>

      {/* ── BODY ── */}
      <div style={{ flex:1, padding:'16px 32px 16px', display:'grid', gridTemplateColumns:'2.1fr 1fr', gap:18, position:'relative', zIndex:1, minHeight:0, overflow:'hidden' }}>

        {/* LEFT COLUMN */}
        <div style={{ display:'flex', flexDirection:'column', gap:12, minHeight:0, overflow:'hidden' }}>
          <FeaturedHero app={featured} palette={palette} fontFamily={fontFamily} />

          {/* genre chips */}
          <div style={{ display:'flex', gap:6, alignItems:'center', flexShrink:0, flexWrap:'wrap' }}>
            {genres.map(g => (
              <button key={g} onClick={() => { setGenre(g); window.arcadeSound.select(); }} style={{
                padding:'5px 10px',
                background: genre===g ? palette[0] : 'transparent',
                color: genre===g ? '#000' : palette[0],
                border:`2px solid ${palette[0]}`,
                fontFamily, fontSize:9, fontWeight:700, letterSpacing:1, cursor:'pointer',
              }}>{g}</button>
            ))}
            <div style={{ flex:1 }} />
            <div style={{ fontFamily, fontSize:8, color:'#fff', opacity:0.5, letterSpacing:1 }}>{filtered.length} GAMES</div>
          </div>

          {/* cabinet grid */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:10, alignContent:'start', overflowY:'auto', flex:1 }}>
            {filtered.slice(0,10).map(app => (
              <MarqueeCabinet key={app.slug} app={app} palette={palette} fontFamily={fontFamily} onSelect={setFeatured} />
            ))}
          </div>
        </div>

        {/* RIGHT COLUMN: leaderboard */}
        <Leaderboard apps={apps} palette={palette} fontFamily={fontFamily} />
      </div>

      {/* ⚙ settings panel */}
      <SettingsPanel paletteIdx={paletteIdx} setPaletteIdx={setPaletteIdx} font={font} setFont={setFont} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
